apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "just-auth.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "just-auth.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "just-auth.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.service.targetPort }}
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: just-auth-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: just-auth-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: just-auth-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: just-auth-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: just-auth-config
              key: DB_NAME
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: just-auth-secret
              key: JWT_SECRET
        - name: JWT_COOKIE_NAME
          valueFrom:
            configMapKeyRef:
              name: just-auth-config
              key: JWT_COOKIE_NAME
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: just-auth-config
              key: CORS_ORIGIN
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
      {{- if .Values.imagePullSecret.create }}
      imagePullSecrets:
      - name: {{ .Values.imagePullSecret.name }}
      {{- end }}